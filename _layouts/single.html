---
layout: default
---

<div class="page-wrap with-sidebar">
  {% if page.author_profile %}
    {% include author-profile.html %}
  {% endif %}
  <article class="content">
    <h1>{{ page.title }}</h1>
    {% if page.date %}<p class="meta">{{ page.date | date: "%d %B %Y" }}</p>{% endif %}
    {{ content }}
  </article>
</div>
